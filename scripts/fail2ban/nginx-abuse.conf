# Scanner noti anche se non 444 (path chiari)
    ^<HOST> - - \[.*\] "(GET|POST|HEAD) /(phpmyadmin|pma|dbadmin|mysql|sqlite|hudson|wp-login|xmlrpc|HNAP1|ncsi\.txt|cgi-bin|\.git|\.env)(/[^"]*)? HTTP/1\.[01]" (403|404|444)
    ^<HOST> - - \[.*\] "(GET|POST) /(config|configs|storage|backup|backups|logs|log|crons|private|secrets)/.* HTTP/1\.[01]" 404
    ^<HOST> - - \[.*\] "(GET|POST) /.*\.(ini|env|yaml|yml|sql|log|sh|bak|backup|old|swp) HTTP/1\.[01]" (403|404)
    ^<HOST> - - \[.*\] ".* HTTP/1\.[01]" (403|444) \d+ ".*" ".*(curl|wget|python|requests|libwww|java|go-http-client|masscan|nmap|zgrab|sqlmap|nikto|dirbuster|dirsearch).*"
    ^<HOST> - - \[.*\] "(CONNECT|TRACE|PUT|DELETE|PATCH) .*
    ^<HOST> .* "(GET|POST) /(c/)?(portal\.php|server/load\.php).*action=handshake.*" (403|444)
    ^<HOST> -.* .*"(?i:.*(OpenBullet|python-requests|curl|libwww-perl|Go-http-client|Masscan|fuzz|scanner|ProxyPool-Scanner|sqlmap|nikto|acunetix|aiohttp|nmap|arachni|havij|wpscan).*")$
    ^<HOST> -.* .*"(GET|POST|HEAD) [^"]+" \d+ \d+ "[^"]*" "(?i:(\.env|/config\.php|/backup|/db_backup|/WEB-INF/|/composer\.json|/composer\.lock|xmlrpc\.php|wp-admin|/\.git|/\.env|/vendor/phpunit|/manager/html|/cgi-bin/).*?) HTTP/.*"
    ^<HOST> -.* .*"(GET|POST|HEAD) [^"]+" \d+ \d+ "[^"]*" "(?i:(UNION\s+SELECT|etc/passwd|base64_decode\(|concat\(|system\(|exec\(|passthru\(|shell_exec\(|\.\./\.\./)).*?" HTTP/.*"
    ^<HOST> -.* .*"(GET|POST|HEAD) [^"]+" \d+ \d+ "[^"]*" "(?i:(sqlmap|dirbuster|Censys|HNAP1|sdk|login\.action|admin|administrator|Shodan|nikto|acunetix|masscan|nmap|wp-login\.php|xmlrpc\.php|phpmyadmin|/\.git|/\.env|UNION\s+SELECT|etc/passwd))".*
    ^<HOST> -.* .*"(?i:.*(Googlebot|Bingbot|YandexBot|DuckDuckBot|Baiduspider|Slackbot|AhrefsBot|SemrushBot|ScreamingFrog|MJ12bot|BingPreview|AlexaBot|Exabot|DotBot|Twitterbot|FacebookExternalHit).*")$
    ^<HOST> -.* .*400 150 "-" "-" "-" ".*
