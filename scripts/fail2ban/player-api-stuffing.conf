# Fail2Ban filter for credential stuffing on player_api.php
# Triggers on 404/401/403 responses (auth failure or disabled account)
# EPG requests (get_short_epg, get_simple_data_table) sono escluse: volume enorme
# di polling legittimo (smart TV), un hiccup transitorio non deve bannare l'IP.
[INCLUDES]
before = common.conf

[Definition]
failregex = ^<HOST> -.*"(?:GET|POST) /player_api\.php[^"]*" "(?:404|401|403)

ignoreregex = action=get_short_epg
              action=get_simple_data_table

datepattern = \[%%d/%%b/%%Y:%%H:%%M:%%S %%z\]
