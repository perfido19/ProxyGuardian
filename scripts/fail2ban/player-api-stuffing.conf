# Fail2Ban filter for credential stuffing on player_api.php
# Triggers on 404/401 responses (invalid username/password)
# Legitimate users never get 404 on player_api — they know their username.
# 5 x 404 in 5 min from same IP → credential stuffer → 7-day ban.
[INCLUDES]
before = common.conf

[Definition]
failregex = ^<HOST> -.*"(?:GET|POST) /player_api\.php\?[^"]*" (?:404|401)

ignoreregex =

datepattern = \[%%d/%%b/%%Y:%%H:%%M:%%S %%z\]
