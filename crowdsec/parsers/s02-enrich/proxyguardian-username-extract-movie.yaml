filter: "evt.Meta.log_type == 'http_access-log' and evt.Parsed.request contains '/movie/'"
name: proxyguardian/username-extract-movie
description: "Estrae username dal path /movie/<username>/... per rilevare combo-checker multi-account"
pattern_syntax:
  USERVAL: '[^&/\s]+'
nodes:
  - grok:
      pattern: '/movie/%{USERVAL:movie_username}/'
      apply_on: request
      statics:
        - meta: probed_username
          expression: evt.Parsed.movie_username
