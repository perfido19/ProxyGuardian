filter: "evt.Meta.log_type == 'http_access-log' and evt.Parsed.request contains '/live/'"
name: proxyguardian/username-extract-live
description: "Estrae username dal path /live/<username>/... per rilevare combo-checker multi-account"
pattern_syntax:
  USERVAL: '[^&/\s]+'
nodes:
  - grok:
      pattern: '/live/%{USERVAL:live_username}/'
      apply_on: request
      statics:
        - meta: probed_username
          expression: evt.Parsed.live_username
