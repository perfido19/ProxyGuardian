type: leaky
name: local/iptv-burst-api-reinit
description: "Session reinit aggressiva: player_api+get.php in burst rapido (client che si riconnette in loop)"
filter: "evt.Meta.log_type == 'http_access-log' and (evt.Parsed.request contains 'player_api.php' or evt.Parsed.request contains 'get.php')"
groupby: "evt.Parsed.remote_addr"
capacity: 15
leakspeed: "1s"
blackhole: "5m"
labels:
  service: http
  type: flood
  remediation: true
