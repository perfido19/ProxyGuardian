type: leaky
name: local/iptv-xplugin-wrong-ua
description: "xplugin.php con UA non-XtreamTV: endpoint esclusivo per device XtreamTV, chiamate con UA diverso sono sospette"
filter: "evt.Meta.log_type == 'http_access-log' and evt.Parsed.request contains 'xplugin.php' and not (evt.Parsed.http_user_agent contains 'XtreamTV')"
groupby: "evt.Parsed.remote_addr"
capacity: 2
leakspeed: "5m"
blackhole: "1h"
labels:
  service: http
  type: bruteforce
  remediation: true
