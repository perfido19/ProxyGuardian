type: leaky
name: local/iptv-player-api-auth-flood
description: "Bruteforce credenziali IPTV: stesso IP chiama player_api.php senza action= (pure auth check)"
filter: "evt.Meta.log_type == 'http_access-log' and evt.Parsed.request contains 'player_api.php' and not (evt.Parsed.request contains 'action=')"
groupby: "evt.Parsed.remote_addr"
capacity: 10
leakspeed: "30s"
blackhole: "30m"
labels:
  service: http
  type: bruteforce
  remediation: true
