type: leaky
name: local/iptv-python-okhttp-api-flood
description: "Scraper okhttp/python-requests: burst di call API con UA okhttp (tipico di scraper Android)"
filter: "evt.Meta.log_type == 'http_access-log' and (evt.Parsed.request contains 'player_api.php' or evt.Parsed.request contains 'get.php') and evt.Parsed.http_user_agent contains 'okhttp'"
groupby: "evt.Parsed.remote_addr"
capacity: 20
leakspeed: "30s"
blackhole: "30m"
labels:
  service: http
  type: scraping
  remediation: true
