############################################################
# MODSEC RELAXED PROFILE - IPTV / XTREAM API
############################################################

SecRuleEngine On

############################################################
# ?? PARANOIA LEVEL BASSO (meno falsi positivi)
############################################################
SecAction \
 "id:900110,\
  phase:1,\
  pass,\
  nolog,\
  setvar:tx.paranoia_level=1"

############################################################
# ?? DISABILITA SOLO REGOLE PROBLEMATICHE IPTV
############################################################

# User-Agent troppo restrittivo
SecRuleRemoveById 4001
SecRuleRemoveById 4006

# Missing headers (rompe box IPTV)
SecRuleRemoveById 920300

# Charset strict (problemi con app)
SecRuleRemoveById 920480

# Alcuni errori body parsing (Xtream sporco)
SecRuleRemoveById 200002

############################################################
# ?? MANTIENI PROTEZIONI CRITICHE
############################################################
# NON rimuovere:
# - SQLi
# - XSS
# - RCE
# - Traversal

############################################################
# ?? PROTEZIONI MIRATE API (ZERO falsi positivi)
############################################################

# Username troppo lungo (credential stuffing / fuzzing)
SecRule ARGS:username "@rx ^.{40,}$" \
 "id:500100,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Username troppo lungo (sospetto)'"

# Password troppo lunga (tool automatici)
SecRule ARGS:password "@rx ^.{40,}$" \
 "id:500101,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Password troppo lunga (sospetto)'"

# Parametri duplicati (bypass)
SecRule &ARGS:username "@gt 1" \
 "id:500102,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Multiple username param'"

SecRule &ARGS:password "@gt 1" \
 "id:500103,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Multiple password param'"

############################################################
# ?? SQLi detection POTENZIATA (senza falsi positivi)
############################################################

SecRule ARGS "@detectSQLi" \
 "id:500110,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'SQL Injection rilevata (API)'"

############################################################
# ?? XSS detection
############################################################

SecRule ARGS "@detectXSS" \
 "id:500120,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'XSS rilevato (API)'"

############################################################
# ?? PATH TRAVERSAL
############################################################

SecRule REQUEST_URI|ARGS "@rx (\.\./|\.\.%2f|/etc/passwd)" \
 "id:500130,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'Path traversal attempt'"

############################################################
# ?? LIMIT BODY (anti abuse leggero)
############################################################

SecRequestBodyLimit 5242880
SecRequestBodyNoFilesLimit 131072

############################################################
# ?? LOG (solo attacchi veri)
############################################################

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

############################################################
# ?? PERFORMANCE
############################################################

SecPcreMatchLimit 1000
SecPcreMatchLimitRecursion 1000

############################################################
# ?? FINE CONFIG
############################################################
