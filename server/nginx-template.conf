load_module modules/ngx_http_modsecurity_module.so;
load_module modules/ngx_http_geoip2_module.so;

user www-data;
worker_processes auto;
worker_rlimit_nofile 300000;

events {
    worker_connections 50000;
    use epoll;
    accept_mutex off;
    multi_accept on;
}

http {

    map_hash_max_size 4096;
    map_hash_bucket_size 128;
    types_hash_max_size 4096;

    ##################################################
    # PERFORMANCE
    ##################################################
    sendfile on;
    aio threads;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;

    keepalive_timeout 60;
    keepalive_requests 10000;

    gzip on;
    gzip_types application/x-mpegURL application/vnd.apple.mpegurl text/plain application/json;
    gzip_comp_level 4;

    include mime.types;
    default_type application/octet-stream;

    client_body_timeout 10s;
    client_header_timeout 10s;
    client_max_body_size 5m;
    client_body_buffer_size 8k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    server_tokens off;

    ##################################################
    # OPEN FILE CACHE
    ##################################################
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    ##################################################
    # CACHE (EPG + STREAMING)
    ##################################################
    proxy_cache_path /var/cache/nginx/epg levels=1:2 keys_zone=epg_cache:10m max_size=500m inactive=5m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/streaming levels=1:2 keys_zone=stream_cache:200m max_size=50g inactive=30s use_temp_path=off;

    map $request_uri $is_stream_cacheable {
        default 0;
        ~*\.ts$     1;
        ~*\.m4s$    1;
        ~*\.mp4$    1;
        ~*\.m3u8$   1;
        ~*\.mkv$    1;
    }

    map $request_uri $has_credentials {
        default 0;
        ~*(username=|password=|token=) 1;
        ~^/live/[^/]+/[^/]+/ 1;
        ~^/movie/[^/]+/[^/]+/ 1;
        ~^/series/[^/]+/[^/]+/ 1;
    }

    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_background_update on;
    proxy_cache_convert_head off;

    ##################################################
    # REQUEST SMUGGLING PROTECTION
    ##################################################
    ignore_invalid_headers on;
    chunked_transfer_encoding off;

    map $http_transfer_encoding $bad_te {
        default 0;
        "~*chunked" 1;
    }

    map $http_content_length $bad_cl {
        default 0;
        "~," 1;
    }

    ##################################################
    # GEOIP2
    ##################################################
    geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
        auto_reload 5m;
        $geoip2_country_code country iso_code;
        $geoip2_country_name country names en;
        $geoip2_metadata_country_build metadata build_epoch;
    }

    geoip2 /usr/share/GeoIP/GeoLite2-City.mmdb {
        auto_reload 5m;
        $geoip2_city_name city names en;
        $geoip2_metadata_city_build metadata build_epoch;
    }

    geoip2 /usr/share/GeoIP/GeoLite2-ASN.mmdb {
        auto_reload 5m;
        $geoip2_asn autonomous_system_number;
        $geoip2_isp autonomous_system_organization;
    }

    ##################################################
    # PASS GEOIP TO BACKEND
    ##################################################
    fastcgi_param COUNTRY_CODE $geoip2_country_code;
    fastcgi_param COUNTRY_NAME $geoip2_country_name;
    fastcgi_param CITY_NAME $geoip2_city_name;
    fastcgi_param ASN $geoip2_asn;
    fastcgi_param ISP $geoip2_isp;

    ##################################################
    # ASN / ISP / VPN
    ##################################################
    map $geoip2_asn $ASN {
        default 0;
        include /etc/nginx/block_asn.conf;
    }

    map $geoip2_isp $ISP {
        default 0;
        include /etc/nginx/block_isp.conf;
    }

    map $http_user_agent $block_badagents {
        default 0;
        include /etc/nginx/block_badagents.conf;
    }

    map $request_uri $masked_uri {
        ~^(?<base>/player_api\.php\?.*password=)[^&]+(?<rest>&.*)?$    ${base}***${rest};
        ~^(?<base>/get\.php\?.*password=)[^&]+(?<rest>&.*)?$           ${base}***${rest};
        ~^(?<base>/xmltv\.php\?.*password=)[^&]+(?<rest>&.*)?$         ${base}***${rest};
        ~^(?<base>/panel_api\.php\?.*password=)[^&]+(?<rest>&.*)?$     ${base}***${rest};
        ~^/live/([^/]+)/([^/]+)/(.*)$                                   /live/$1/***/$3;
        ~^/movie/([^/]+)/([^/]+)/(.*)$                                  /movie/$1/***/$3;
        ~^/series/([^/]+)/([^/]+)/(.*)$                                 /series/$1/***/$3;
        default $request_uri;
    }

    ##################################################
    # USER AGENT
    ##################################################
    map $http_user_agent $bad_ua {
        default 0;
        "~*(curl|python|aiohttp|requests|libwww|java|go-http-client)" 1;
        "~*(masscan|nmap|zmap|zgrab|sqlmap|nikto|dirbuster|dirsearch)" 1;
        "~*(stbapp|mag200|allOrigins/3)" 1;
        "~*(ahrefs|semrush|mj12|dotbot|bingbot|yandex|baidu|sogou|exabot|serpstat|screaming frog)" 1;
        "~*(bot|crawler|scanner|scrapy|spider)" 1;
        "~*(censys|censysinspect|shodan|zoomEye|securitytrails)" 1;
        "~*(hydra|thc|bruteforce|medusa|ncrack)" 1;
        "~*(nessus|openvas|greenbone|tenable|security scanner)" 1;
        "~*(\"[[:space:]]+/|/[[:space:]]{2,}|\\x00|\\r|\\n)" 1;
    }

    map $http_user_agent $malformed_ua {
        default 0;
        "~*^[A-Za-z0-9\-\._\(\);]+ /" 1;
    }

    map $query_string $qs_malformed {
        default 0;
        "~[\r\n]" 1;
        "~\s{2,}" 1;
    }

    map $arg_username $bad_username {
        default 0;
        "~[\x00-\x1F\x7F]" 1;
    }

    map $query_string $bad_duplicate_credentials {
        default 0;
        "~(username=[^&]+.*&.*username=|password=[^&]+.*&.*password=)" 1;
    }

    map $arg_username $username_length_attack {
        default 0;
        "~^.{40,}$" 1;
    }

    map $query_string $qs_too_long {
        default 0;
        "~^.{400,}$" 1;
    }

    map $query_string $too_many_params {
        default 0;
        "~^(?:[^&]*&){10,}" 1;
    }

    ##################################################
    # QUERY STRING PROTECTION
    ##################################################
    map $query_string $qs_attack {
        default 0;
        "~*(union\s+select|information_schema|load_file|outfile)" 1;
        "~*(<script|javascript:|onerror=|onload=)" 1;
        "~*(\.\./|\.\.%2f|/etc/passwd)" 1;
        "~*(rm\s+-rf|/bin/(sh|bash))" 1;
    }

    ##################################################
    # CONTENT-TYPE OGNL / STRUTS PROTECTION
    ##################################################
    map $http_content_type $bad_content_type {
        default 0;
        "~*(\$\{|#|ognl|java\.lang|@)" 1;
    }

    ##################################################
    # COUNTRY WHITELIST
    ##################################################
    map $geoip2_country_code $allowed_country {
        default 0;
        include /etc/nginx/country_whitelist.conf;
    }

    ##################################################
    # LOG
    ##################################################
    log_format main_geo
        '$remote_addr - $remote_user [$time_local] '
        '"$request_method $masked_uri $server_protocol" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        '"$geoip2_country_code $geoip2_country_name $geoip2_city_name" '
        '"AS$geoip2_asn" "$geoip2_isp"';

    access_log /var/log/nginx/access.log main_geo;
    error_log  /var/log/nginx/error.log;

    ##################################################
    # LIMIT ZONES
    ##################################################
    limit_req_zone  $binary_remote_addr zone=behavior_stream:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=stream_conn:10m;
    limit_conn_zone $binary_remote_addr zone=api_conn:5m;
    limit_req_zone $binary_remote_addr zone=login_api:10m rate=1r/s;

    map "$binary_remote_addr:$arg_username" $ip_user_key {
        default $binary_remote_addr:$arg_username;
    }

    limit_req_zone $ip_user_key zone=ip_user_limit:10m rate=3r/s;

    ##################################################
    # UPSTREAM
    ##################################################
    upstream backend {
        server main.netbird.cloud:8880;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    ##################################################
    # SERVER
    ##################################################
    server {
        listen 8880 reuseport;

        ##################################################
        # SECURITY HEADERS
        ##################################################
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

        ##################################################
        # DISABLE XML-RPC
        ##################################################
        location = /xmlrpc.php {
            deny all;
            return 403;
        }

        location ~ ^/(var|log|logs) {
            deny all;
            return 444;
        }

        ##################################################
        # MODSECURITY
        ##################################################
        modsecurity on;
        modsecurity_rules_file /etc/nginx/modsec_includes.conf;

        ##################################################
        # PRE-FILTER
        ##################################################
        if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) { return 444; }
        if ($bad_ua) { return 444; }
        if ($malformed_ua) { return 444; }
        if ($block_badagents) { return 403; }
        if ($bad_te) { return 444; }
        if ($bad_cl) { return 444; }
        if ($bad_content_type) { return 444; }
        if ($request_uri ~ "[\x00-\x1F]") { return 444; }
        if ($qs_malformed) { return 444; }
        if ($bad_duplicate_credentials) { return 444; }
        if ($bad_username) { return 444; }
        if ($username_length_attack) { return 444; }
        if ($qs_too_long) { return 444; }
        if ($too_many_params) { return 444; }
        if ($qs_attack) { return 403; }
        if ($ASN) { return 444; }
        if ($ISP) { return 444; }
        if ($allowed_country = 0) { return 403; }

        ##################################################
        # BLOCCO FILE SENSIBILI E DIRECTORY
        ##################################################
        location ~* ^/(?!\.well-known)(?:(?:admin|administrator|panel|control|cpanel|dashboard|manage|manager|backend|config|configs|settings|private|secrets|storage|vault|backup|backups|logs|log|crons|tmp|temp|test|old|bak|dev|staging|beta|application|adminer|tools|includes|lib|phpmyadmin|pma|dbadmin|mysql|sqlite|cgi-bin|server-status|status|debug|HNAP1)(?:/|$)|.*\.(?:bak|backup|old|orig|swp|sql|env|ini|log|conf|yaml|yml|json|xml|txt|sh|gz|tar|tgz|zip|rar|~)$) {
            access_log off;
            return 444;
        }

        location ~* \.(cgi|pl|py|lua|asp|exe)$ {
            return 403;
        }

        ##################################################
        # EPG
        ##################################################
        location ~ ^/player_api\.php\?(.+&)?action=get_short_epg(&|$) {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_hide_header X-AspNet-Version;
            proxy_hide_header X-Backend-Server;
            proxy_hide_header X-Runtime;
            proxy_hide_header X-Generator;

            proxy_cache epg_cache;
            proxy_cache_key "$arg_stream_id:$arg_limit";
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;

            add_header X-Cache $upstream_cache_status;
            proxy_pass http://backend;
        }

        ##################################################
        # XTREAM API
        ##################################################
        location ~ ^/(player_api\.php|get\.php|xmltv\.php|panel_api\.php)$ {
            modsecurity off;

            limit_conn api_conn 10;
            limit_req zone=login_api burst=10 nodelay;
            limit_req zone=ip_user_limit burst=20;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_hide_header X-AspNet-Version;
            proxy_hide_header X-Backend-Server;
            proxy_hide_header X-Runtime;
            proxy_hide_header X-Generator;

            proxy_connect_timeout 20s;
            proxy_read_timeout 45s;
            proxy_send_timeout 45s;

            proxy_buffering off;
            sub_filter_types application/json;
            sub_filter_once off;
            sub_filter '"password":"[^"]+"' '"password":"***"';

            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_pass http://backend;
        }

        ##################################################
        # STREAMING
        ##################################################
        location / {
            limit_conn stream_conn 10;
            limit_req zone=behavior_stream burst=50 delay=5;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Range $http_range;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Original-Scheme $scheme;
            proxy_redirect off;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_hide_header X-AspNet-Version;
            proxy_hide_header X-Backend-Server;
            proxy_hide_header X-Runtime;
            proxy_hide_header X-Generator;

            ##################################################
            # BUFFERING
            ##################################################
            proxy_buffering on;
            proxy_request_buffering off;
            proxy_buffers 16 512k;
            proxy_buffer_size 256k;
            proxy_busy_buffers_size 1m;

            ##################################################
            # CACHE
            ##################################################
            proxy_cache stream_cache;
            proxy_cache_key "$scheme$host$uri";
            proxy_no_cache $has_credentials;
            proxy_cache_bypass $has_credentials;
            proxy_cache_valid 200 206 15s;
            proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_ignore_headers Cache-Control Set-Cookie;
            add_header X-Cache $upstream_cache_status;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            ##################################################
            # STREAM SETTINGS
            ##################################################
            proxy_max_temp_file_size 0;
            proxy_temp_file_write_size 1m;

            ##################################################
            # RESILIENZA
            ##################################################
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            proxy_pass http://backend;
        }
    }
}

